name: Build Downloader APK

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    name: Build Android Release
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🏗️ Auto-Generate Missing Flutter Platform Files
        run: |
          flutter create .
          flutter pub get

      - name: 🔐 Auto-Inject Android Storage Permissions
        run: |
          sed -i 's/<application/    <uses-permission android:name="android.permission.INTERNET" \/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" \/>\n    <application/g' android/app/src/main/AndroidManifest.xml

      - name: 🎨 Apply Custom App Icon
        run: flutter pub run flutter_launcher_icons

      - name: 🛠️ Build the Android APK
        run: flutter build apk --release

      - name: 📤 Upload the finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Zawar-Downloader-App
          path: build/app/outputs/flutter-apk/app-release.apk
